services:
  - type: web
    name: facebook-auto-reply-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: VERIFY_TOKEN
        value: mybot2024
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: SHEET_ID
        sync: false
      - key: GOOGLE_CREDS_JSON
        sync: false
